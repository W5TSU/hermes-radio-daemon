; hermes-radio-daemon user / profile configuration
; Place this file at /etc/hermes/user.ini  (or pass -u <path>)

[main]
; Index of the profile that is active at startup
current_profile = 0

; Index of the profile to return to after a timeout
default_profile = 0

; Seconds of inactivity before returning to the default profile.
; Set to -1 to disable the timeout.
default_profile_fallback_timeout = -1

; Frequency tuning step in Hz (used by front-panel encoders if present)
step_size = 100

; Compatibility transmit tone flag
tone_generation = 0

; ----------------------------------------------------------------
; Profile definitions
; Add additional [profile1], [profile2], … sections as needed.
; The daemon supports up to 4 profiles (MAX_RADIO_PROFILES).
; ----------------------------------------------------------------

; ── profile0: digital data — flat response, no voice DSP ────────
[profile0]
; Operating frequency in Hz
freq = 7050000

; Mode: USB | LSB | CW
mode = USB

; Operating mode: 0=full voice, 1=loopback, 2=controls only
operating_mode = 0

; RF power output level as a percentage (0–100)
power_level_percentage = 100

; ALSA mixer levels (0–100)
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100

; Band-pass filter edges in Hz (300–2800 Hz for data)
bpf_low = 300
bpf_high = 2800

; AGC: OFF | SLOW | MEDIUM | FAST
agc = OFF

; Compressor: OFF | ON
compressor = OFF

; TX pre-emphasis: OFF | ON  (6 dB/octave treble boost above 2 kHz for voice)
tx_preemphasis = OFF

; RX noise reduction: OFF | ON  (libspecbleach adaptive spectral denoiser)
noise_reduction = OFF

; Enable digital voice / RADEv2 mode for this profile.
; hfsignals backend: switches the embedded legacy_sbitx DSP path.
; hamlib backend: selects the hamlib-radev2 pipeline slot/metadata for
; external modem integration; it does not replace the Hamlib audio bridge.
digital_voice = 0

; Front-panel hardware controls
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile1: SSB voice — full DSP chain for best voice quality ─
[profile1]
freq = 14200000
mode = USB
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 300
bpf_high = 3000
agc = SLOW
compressor = ON
tx_preemphasis = ON
noise_reduction = ON
digital_voice = 0
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile2: NBFM (Narrow Band FM, 5 kHz deviation) ──────────
[profile2]
freq = 145500000
mode = FM
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 100
bpf_high = 7000
agc = SLOW
compressor = OFF
tx_preemphasis = OFF
noise_reduction = OFF
digital_voice = 0
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile3: Broadcast AM ──────────────────────────────────
[profile3]
freq = 1000000
mode = AM
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 50
bpf_high = 10000
agc = SLOW
compressor = OFF
tx_preemphasis = OFF
noise_reduction = OFF
digital_voice = 0
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1
