; hermes-radio-daemon user / profile configuration
; Place this file at /etc/sbitx/user.ini  (or pass -u <path>)

[main]
current_profile = 0
default_profile = 0
default_profile_fallback_timeout = -1
step_size = 100
tone_generation = 0

; ── profile0: digital data — flat, no voice DSP ──────────────
[profile0]
freq = 7050000
mode = USB
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 300
bpf_high = 2800
agc = OFF
compressor = OFF
tx_preemphasis = OFF
noise_reduction = OFF
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile1: SSB voice — full DSP chain ─────────────────────
[profile1]
freq = 14200000
mode = USB
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 50
bpf_high = 3000
agc = SLOW
compressor = ON
tx_preemphasis = ON
noise_reduction = ON
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile2: NBFM (Narrow Band FM, 5 kHz deviation, 2m band) ─
[profile2]
freq = 145500000
mode = FM
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 100
bpf_high = 7000
agc = SLOW
compressor = OFF
tx_preemphasis = OFF
noise_reduction = OFF
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile3: Broadcast AM (MW band) ──────────────────────────
[profile3]
freq = 1000000
mode = AM
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 50
bpf_high = 10000
agc = SLOW
compressor = OFF
tx_preemphasis = OFF
noise_reduction = OFF
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile4: DRM (Digital Radio Mondiale) ────────────────────
[profile4]
freq = 6095000
mode = DRM
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 100
bpf_high = 6000
agc = OFF
compressor = OFF
tx_preemphasis = OFF
noise_reduction = OFF
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1

; ── profile5: Digital Voice (RADEv2) ─────────────────────────
[profile5]
freq = 7050000
mode = USB
operating_mode = 0
power_level_percentage = 100
mic_level = 50
rx_level = 100
speaker_level = 50
tx_level = 100
bpf_low = 50
bpf_high = 3000
agc = OFF
compressor = OFF
tx_preemphasis = OFF
noise_reduction = OFF
digital_voice = 1
enable_knob_volume = 1
enable_knob_frequency = 1
enable_ptt = 1
