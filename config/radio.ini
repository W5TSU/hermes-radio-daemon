; hermes-radio-daemon hardware / radio configuration
; Place this file at /etc/hermes/radio.ini  (or pass -r <path>)

[main]

; Radio backend selection.
;   hamlib     native hermes-radio-daemon backend (CAT control via Hamlib)
;   hfsignals  bootstrap the vendored legacy_sbitx stack in-process so all
;              legacy sBitx/zBitx features and the original ALSA/DSP path stay intact
radio_backend = hamlib

; Hamlib rig model number.  Only used when radio_backend = hamlib.
; The alias `hamlib_model` is also accepted.
; Use 1 for the "Dummy" (software test) rig.
; For a full list run:  rigctl -l
radio_model = 1

; Serial port path (or hostname:port for networked rigs / rigctld)
; The alias `rig_path` is also accepted.
rig_pathname = /dev/ttyUSB0

; Serial baud rate (ignored for network rigs)
serial_rate = 9600

; PTT control type: RIG | SERIAL_RTS | SERIAL_DTR | GPIO | ...
; The alias `ptt_mode` is also accepted.
ptt_type = RIG
ptt_pathname =

; Serial number of this station (informational, e.g. used by hermes-net)
serial_number = 0

; SWR protection threshold: vswr * 10  (e.g. 25 = SWR 2.5)
; Set to 0 to disable SWR protection
reflected_threshold = 25

; Enable the SHM control interface used by sbitx_client
enable_shm_control = 1

; Enable websocket support.
; hamlib backend: plain WS control/media server bound by websocket_bind.
; hfsignals backend: uses the embedded legacy HTTPS/WSS web UI.
enable_websocket = 0
websocket_bind = 0.0.0.0:8080

; Optional ALSA media bridge.  Only used when radio_backend = hamlib.
; (hfsignals has its own ALSA capture/playback in legacy_sbitx/sbitx_alsa.c)
enable_audio_bridge = 0
capture_device = default
playback_device = default
audio_sample_rate = 8000
audio_period_size = 160
audio_queue_samples = 16000

; Output directory for daemon-managed WAV recordings (hamlib path only)
recording_dir = /var/lib/hermes-radio-daemon

; BFO offset in Hz (kept for API compatibility; not used with Hamlib radios)
bfo = 0
