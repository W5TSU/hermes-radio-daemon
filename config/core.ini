; hermes-radio-daemon -- sBitx/zBitx radio hardware configuration
; Installed at /etc/sbitx/core.ini
;
; The daemon also looks for user/profiles at /etc/sbitx/user.ini

[main]

; Radio backend selection.
;   hfsignals  embedded sBitx/zBitx DSP + ALSA path
;   hamlib     Hamlib CAT-controlled radios
radio_backend = hfsignals

; Hardware profile: sbitx | zbitx
; Selects GPIO pin layout, BFO frequency, and TX/RX switching
hw_profile = sbitx

; BFO frequency in Hz (override, default is per-profile)
bfo = 40035000

; Bridge compensation for SWR measurement (0-100)
bridge_compensation = 100

; Serial number (informational)
serial_number = 0

; SWR protection threshold: vswr * 10  (25 = SWR 2.5, 0 = disabled)
reflected_threshold = 25

; I2C device path for power/SWR ADC chip
i2c_dev = /dev/i2c-1

; Enable interfaces
enable_websocket = 0
enable_shm_control = 1

; Audio bridge for websocket RX/TX streaming (both backends)
enable_audio_bridge = 0
audio_sample_rate = 8000

; Path to Dream DRM receiver binary (for MODE_DRM)
dream_path = /usr/bin/dream

; FT8 message spool directory
ft8_spool_dir = /var/spool/hermes-ft8

; --- per-band TX power calibration ---
; Each band has f_start (Hz), f_stop (Hz), and scale (multiplier).
; Uncomment and adjust per your radio.
; [tx_band0]
; f_start = 3000000
; f_stop = 5000000
; scale = 1.0
